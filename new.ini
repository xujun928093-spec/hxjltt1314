[custom]
enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Expire|Official|Website

; ==========================================================
; 1) 规则（自上而下优先级，置顶大流量直连）
; ==========================================================
; --- 115 网盘大流量直连白名单（置顶：让 AList 播放时彻底不冲击内核队列） ---
ruleset=DIRECT,[]DOMAIN-KEYWORD,115
ruleset=DIRECT,[]DOMAIN-SUFFIX,115.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,anxia.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,115cdn.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,115kan.com

; --- 局域网与内网服务 (侧路由必备 - 已包含 192.168.5.x 全部本地 IP) ---
ruleset=DIRECT,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=DIRECT,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,172.16.0.0/12,no-resolve

; --- 常见的国内流媒体与测速 (防止误伤) ---
ruleset=DIRECT,[]DOMAIN-SUFFIX,speedtest.net
ruleset=DIRECT,[]DOMAIN-KEYWORD,p2p
ruleset=DIRECT,[]DOMAIN-KEYWORD,xunlei
ruleset=DIRECT,[]IP-CIDR,5.5.5.5/32
ruleset=DIRECT,[]DOMAIN-SUFFIX,mpyit.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,avfan.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,skrbthv.top
ruleset=DIRECT,[]DOMAIN-SUFFIX,skrbtso.cc
ruleset=DIRECT,[]DOMAIN-KEYWORD,skrbt

