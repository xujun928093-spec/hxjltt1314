custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]🇰🇷 KR`[]🇹🇼 TW`[]优选节点`[]DIRECT
