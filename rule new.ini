custom_proxy_group=测速工具`select`[]DIRECT`[]HK`[]TW`[]JP`[]SG`[]US`[]冷门节点`[]手动选择`[]自动选择`[]Default
custom_proxy_group=Steam`select`[]DIRECT`[]HK`[]TW`[]JP`[]SG`[]US`[]冷门节点`[]手动选择`[]自动选择`[]Default
custom_proxy_group=Bybit`select`[]HK`[]TW`[]JP`[]SG`[]US`[]冷门节点`[]手动选择`[]自动选择`[]DIRECT`[]Default
