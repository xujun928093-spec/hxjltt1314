[custom]
enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Expire|Official|Website

; ==========================================================
; 1) 基础出口与核心策略组 (必须置顶声明)
; ==========================================================
custom_proxy_group=手动选择`select`[]自动选择`[]HK`[]TW`[]JP`[]SG`[]US`[]冷门节点`[]DIRECT
custom_proxy_group=Default`select`[]HK`[]TW`[]JP`[]SG`[]US`[]冷门节点`[]自动选择`[]手动选择`[]DIRECT
custom_proxy_group=漏网之鱼`select`[]Default`[]DIRECT`[]自动选择`[]冷门节点`[]手动选择
custom_proxy_group=非标端口`select`[]DIRECT`[]漏网之鱼

; ==========================================================
; 2) 节点国家分组自动化 (标准正则优化，彻底通过 OpenClash 校验)
; ==========================================================
custom_proxy_group=自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=HK`url-test`(🇭🇰|香港|Macau|Macao|HK|HongKong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=TW`url-test`(🇹🇼|台湾|TW|Taiwan|TaiPei|HiNet)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=JP`url-test`(🇯🇵|日本|JP|Japan|Tokyo|Osaka)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=SG`url-test`(🇸🇬|新加坡|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=US`url-test`(🇺🇸|美国|US|United States|Los Angeles|San Jose|Seattle|New York)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=冷门节点`select`^(?!.*(🇭🇰|香港|HK|Hong|🇯🇵|日本|JP|Tokyo|Osaka|🇹🇼|台湾|TW|Taiwan|🇸🇬|新加坡|SG|Singapore|🇺🇸|美国|US|United)).*

; ==========================================================
; 3) 应用分流策略组
; ==========================================================
custom_proxy_group=Apple`select`[]HK`[]TW`[]JP`[]SG`[]US`[]冷门节点`[]手动选择`[]自动选择`[]DIRECT`[]Default
custom_proxy_group=ChatGPT`select`[]US`[]TW`[]JP`[]SG`[]HK`[]冷门节点`[]手动选择`[]自动选择`[]Default
custom_proxy_group=AI`select`[]US`[]TW`[]JP`[]SG`[]HK`[]冷门节点`[]手动选择`[]自动选择`[]Default
custom_proxy_group=Telegram`select`[]HK`[]TW`[]JP`[]SG`[]US`[]冷门节点`[]手动选择`[]自动选择`[]Default
custom_proxy_group=社交媒体`select`[]HK`[]TW`[]JP`[]SG`[]US`[]冷门节点`[]手动选择`[]自动选择`[]Default
custom_proxy_group=TeamViewer`select`[]HK`[]TW`[]JP`[]SG`[]US`[]冷门节点`[]手动选择`[]自动选择`[]Default
custom_proxy_group=YouTube`select`[]HK`[]TW`[]JP`[]SG`[]US`[]冷门节点`[]手动选择`[]自动选择`[]Default
custom_proxy_group=Netflix`select`[]HK`[]TW`[]JP`[]SG`[]US`[]冷门节点`[]手动选择`[]自动选择`[]Default
custom_proxy_group=Instagram`select`[]HK`[]TW`[]JP`[]SG`[]US`[]冷门节点`[]手动选择`[]自动选择`[]Default
custom_proxy_group=X`select`[]HK`[]TW`[]JP`[]SG`[]US`[]冷门节点`[]手动选择`[]自动选择`[]Default
