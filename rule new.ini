[custom]
enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 🟢 模块零：节点清洗
; ==========================================================
; 剔除机场展示/说明/防失联/流量提示等垃圾节点
exclude=流量|套餐|到期|剩余|重置|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Expire|Official|Website


; ==========================================================
; 🟢 模块一：策略组声明（严格按照【由底向上】的引用顺序排列）
; ==========================================================

; --- 1.1 基础节点国家与测速自动化组（最底层，供后续所有组引用） ---
custom_proxy_group=♻️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 JP`url-test`(🇯🇵|日本|JP|Japan|Tokyo|Osaka)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 SG`url-test`(🇸🇬|新加坡|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 US`url-test`(🇺🇸|美国|US|United States|Los Angeles|San Jose|Seattle|New York)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇩🇪 DE`url-test`(🇩🇪|德国|DE|Germany|Frankfurt)`http://www.gstatic.com/generate_204`300,,50
; 优选节点：收纳所有未被分配到 JP, SG, US, DE 的剩余节点
custom_proxy_group=优选节点`select`^(?!.*(🇯🇵|日本|JP|Tokyo|Osaka|🇸🇬|新加坡|SG|Singapore|🇺🇸|美国|US|United|🇩🇪|德国|DE|Germany|Frankfurt)).*

; --- 1.2 核心出口与兜底策略组 ---
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]DIRECT
custom_proxy_group=🌐 Default`select`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]♻️ 自动选择`[]🚀 手动选择`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🌐 Default`[]DIRECT`[]♻️ 自动选择`[]优选节点`[]🚀 手动选择
custom_proxy_group=🔀 非标端口`select`[]DIRECT`[]🐟 漏网之鱼

; --- 1.3 定制专属分流组 ---
custom_proxy_group=🔞 Adult`select`[]🚀 手动选择`[]🌐 Default`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]DIRECT
custom_proxy_group=🔍 Search`select`[]♻️ 自动选择`[]🚀 手动选择`[]🌐 Default`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]DIRECT
custom_proxy_group=🔎 谷歌`select`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT`[]🌐 Default

; --- 1.4 常规应用分流策略组 ---
custom_proxy_group=🧠 AI`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇩🇪 DE`[]优选节点`[]🚀 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🍎 Apple`select`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT`[]🌐 Default
custom_proxy_group=📨 Telegram`select`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]🚀 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🎬 YouTube`select`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]🚀 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🎥 Netflix`select`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]🚀 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=📸 Instagram`select`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]🚀 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🐦 X`select`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]🚀 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🧑‍💻 GitHub`select`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]🚀 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🚝 测速工具`select`[]DIRECT`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]🚀 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🎮 Steam`select`[]DIRECT`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]🚀 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🟥 Adobe`select`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT`[]REJECT`[]🌐 Default
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇩🇪 DE`[]优选节点`[]♻️ 自动选择`[]🚀 手动选择`[]🌐 Default
custom_proxy_group=☁️ cloudflare`select`[]🌐 Default`[]DIRECT`[]🚀 手动选择

; --- 1.5 节点维护群特供说明 ---
custom_proxy_group=🧭 手动选择`select`.*


; ==========================================================
; 🟢 模块二：分流规则集（自上而下严格匹配，已剥离所有死链）
; ==========================================================

; --- 2.1 高优先级：大流量本地直连白名单（置顶，防止 AList 播放大流量冲击内核） ---
ruleset=DIRECT,[]DOMAIN-KEYWORD,115
ruleset=DIRECT,[]DOMAIN-SUFFIX,115.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,anxia.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,115cdn.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,115kan.com

; --- 2.2 高优先级：局域网与内网本地流量 ---
ruleset=DIRECT,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=DIRECT,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,172.16.0.0/12,no-resolve

; --- 2.3 高优先级：Edgetunnel 节点底层高优先级豁免 ---
ruleset=DIRECT,[]DOMAIN-KEYWORD,edgetunnel,no-resolve

; --- 2.4 高优先级：国内媒体/测速/磁力站（强效防止 DNS 拦截死锁） ---
ruleset=DIRECT,[]DOMAIN-SUFFIX,speedtest.net,no-resolve
ruleset=DIRECT,[]DOMAIN-KEYWORD,p2p,no-resolve
ruleset=DIRECT,[]DOMAIN-KEYWORD,xunlei,no-resolve
ruleset=DIRECT,[]IP-CIDR,5.5.5.5/32,no-resolve
ruleset=DIRECT,[]DOMAIN-SUFFIX,mpyit.com,no-resolve
ruleset=DIRECT,[]DOMAIN-SUFFIX,skrbthv.top,no-resolve
ruleset=DIRECT,[]DOMAIN-SUFFIX,skrbtso.cc,no-resolve
ruleset=DIRECT,[]DOMAIN-SUFFIX,skrbtun.top,no-resolve
ruleset=DIRECT,[]DOMAIN-SUFFIX,skrbtso.top,no-resolve
ruleset=DIRECT,[]DOMAIN-KEYWORD,skrbt,no-resolve

; --- 2.5 专属定制：🔍 搜索规则（仅包含指定的 avfan） ---
ruleset=🔍 Search,[]DOMAIN-SUFFIX,avfan.com

; --- 2.6 专属定制：🔎 谷歌与通用搜索（包含已被安全收纳的 google-cn） ---
ruleset=🔎 谷歌,[]GEOSITE,google
ruleset=🔎 谷歌,[]GEOIP,google,no-resolve
